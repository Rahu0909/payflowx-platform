apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service
  namespace: payflowx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
        - name: payment-service
          image: ghcr.io/rahu0909/payment-service:latest

          ports:
            - containerPort: 8085
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: payflowx-config
                  key: EUREKA_SERVER_URL