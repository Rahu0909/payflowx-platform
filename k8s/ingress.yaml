apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: payflowx-ingress
  namespace: payflowx

spec:
  rules:
    - host: payflowx.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: api-gateway
                port:
                  number: 8080