apiVersion: apps/v1
kind: Deployment

metadata:
  name: discovery-server
  namespace: payflowx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: discovery-server

  template:
    metadata:
      labels:
        app: discovery-server

    spec:
      containers:
        - name: discovery-server
          image: ghcr.io/rahu0909/discovery-server:latest

          ports:
            - containerPort: 8761
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: payflowx-config
                  key: EUREKA_SERVER_URL