server:
  port: 8081

spring:
  application:
    name: auth-service

  profiles:
    active: local

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2

    template:
      mandatory: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
            loggerLevel: basic

      httpclient:
        hc5:
          enabled: true

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 25

    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
logging:
  level:
    root: INFO
    com.payflowx.auth: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html   # Custom URL path
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    algorithm: ${JWT_ALGORITHM:RS256}
    secret: ${JWT_SECRET:dummy-dev-secret}
    private-key: ${JWT_PRIVATE_KEY:classpath:keys/private.pem}
    public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}
    expiration: ${JWT_EXPIRATION:3600000}