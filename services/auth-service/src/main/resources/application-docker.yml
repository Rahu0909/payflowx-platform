spring:

  datasource:
    driver-class-name: org.postgresql.Driver

eureka:
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://payflowx-zipkin:9411/api/v2/spans

logging:
  level:
    root: INFO
    com.payflowx.auth: INFO