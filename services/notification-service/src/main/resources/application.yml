server:
  port: 8087

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:

      merchantService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50

      webhookDispatcher:
        registerHealthIndicator: true
        slidingWindowSize: 20
        failureRateThreshold: 50

  retry:
    instances:

      merchantService:
        maxAttempts: 3
        waitDuration: 2s

      webhookDispatcher:
        maxAttempts: 3
        waitDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.payflowx.notification: DEBUG