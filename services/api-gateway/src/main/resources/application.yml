server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway,metrics

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

app:
  jwt:
    algorithm: ${JWT_ALGORITHM:RS256}
    secret: ${JWT_SECRET:dummy-dev-secret}
    public-key: ${JWT_PUBLIC_KEY:classpath:keys/public.pem}