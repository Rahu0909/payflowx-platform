server:
  port: 8085

spring:
  application:
    name: payment-service

  profiles:
    active: local

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
            loggerLevel: basic

      httpclient:
        hc5:
          enabled: true

  jackson:
    time-zone: UTC

    serialization:
      write-dates-as-timestamps: false

    default-property-inclusion: non_null

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

    listener:
      simple:
        acknowledge-mode: auto

        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2

    template:
      mandatory: true

  task:
    scheduling:
      pool:
        size: 5

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        jdbc:
          time_zone: UTC

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true
    hostname: localhost

management:
  endpoint:
    health:
      show-details: always

      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    root: INFO

    com.payflowx.payment: DEBUG

    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

payment:
  events:
    batch-size: 100
    retry-threshold: 5