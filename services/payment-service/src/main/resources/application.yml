server:
  port: 8085

spring:
  application:
    name: payment-service
  profiles:
    active: local
  jackson:
    time-zone: UTC

    serialization:
      write-dates-as-timestamps: false

    default-property-inclusion: non_null

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
            loggerLevel: basic

      httpclient:
        hc5:
          enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

    listener:
      simple:
        acknowledge-mode: auto

        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2

    template:
      mandatory: true

  task:
    scheduling:
      pool:
        size: 5

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

        jdbc:
          batch_size: 25
          time_zone: UTC

    show-sql: false

resilience4j:
  circuitbreaker:
    instances:

      orderService:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

      merchantService:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:

      orderService:
        maxAttempts: 3
        waitDuration: 1s

      merchantService:
        maxAttempts: 3
        waitDuration: 1s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

  api-docs:
    path: /v3/api-docs
logging:
  level:
    root: INFO
    com.payflowx.payment: DEBUG

payment:
  events:
    batch-size: 100
    retry-threshold: 5