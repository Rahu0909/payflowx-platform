name: PayFlowX CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  build-and-publish:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - discovery-server
          - api-gateway
          - auth-service
          - user-service
          - merchant-service
          - order-service
          - payment-service
          - settlement-service
          - notification-service
          - audit-service

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant Maven Permission
        run: chmod +x mvnw
        working-directory: services/${{ matrix.service }}

      - name: Build Service
        run: ./mvnw clean package -DskipTests
        working-directory: services/${{ matrix.service }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest \
          .
        working-directory: services/${{ matrix.service }}

      - name: Push Docker Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest