name: PayFlowX CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  build-services:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - discovery-server
          - api-gateway
          - auth-service
          - user-service
          - merchant-service
          - order-service
          - payment-service
          - settlement-service
          - notification-service
          - audit-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant Maven Wrapper Permission
        run: chmod +x mvnw
        working-directory: services/${{ matrix.service }}

      - name: Build Service
        run: ./mvnw clean package -DskipTests
        working-directory: services/${{ matrix.service }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: services/${{ matrix.service }}/target/*.jar